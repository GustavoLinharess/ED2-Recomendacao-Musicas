<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Recomendação de Músicas — ED2 / UnB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Documentação do sistema de recomendação de músicas com grafos e similaridade de atributos.">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #2563eb;
      --cover-bg: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%);
    }
    .app-name-link img { width: 0; }
    section.cover.show {
      background: var(--cover-bg) !important;
      color: #fff;
    }
    section.cover .cover-main > p a {
      border-radius: 8px;
    }
    section.cover.show .cover-main > p:last-child a {
      background: #fff;
      color: #1e3a8a;
      border: none;
    }
    section.cover.show blockquote p,
    section.cover.show .cover-main ul li {
      color: #eef2ff;
    }
    .markdown-section table { display: table; width: 100%; }
    .markdown-section code { color: #1e3a8a; background: #eef2ff; }
  </style>
</head>
<body>
  <div id="app">carregando…</div>
  <script>
    window.$docsify = {
      name: '🎵 Recomendação de Músicas',
      repo: 'https://github.com/GustavoLinharess/ED2-Recomendacao-Musicas',
      loadSidebar: true,
      coverpage: true,
      onlyCover: false,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: 'Buscar…',
        noData: 'Nenhum resultado.',
        depth: 3,
      },
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
</body>
</html>
